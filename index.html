<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的极简主页</title>
    <style>
        /* 1. 全局重置与流光背景 */
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
            color: #ffffff;
            /* 柔和的高级深色流光渐变 */
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #111827, #172554);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            line-height: 1.8;
            font-weight: 300;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. 居中容器，增加宽裕的留白 */
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 80px 20px;
        }

        /* 3. 极简头部 */
        header {
            margin-bottom: 60px;
            animation: fadeUp 1s ease-out;
        }

        h1 {
            font-size: 2.8em;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 8px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.1em;
            color: #94a3b8;
            letter-spacing: 2px;
        }

        /* 4. 核心：毛玻璃质感卡片（Glassmorphism） */
        .glass-card {
            background: rgba(255, 255, 255, 0.03); /* 极弱的白色背景 */
            backdrop-filter: blur(16px);           /* 背景模糊效果 */
            -webkit-backdrop-filter: blur(16px);   /* 兼容苹果设备 */
            border: 1px solid rgba(255, 255, 255, 0.08); /* 若隐若现的边线 */
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.4s ease, background 0.4s ease;
            animation: fadeUp 1s ease-out backwards;
        }

        .glass-card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.05);
        }

        /* 给不同卡片设置动画延迟，实现顺滑入场 */
        .glass-card:nth-child(2) { animation-delay: 0.2s; }
        .glass-card:nth-child(3) { animation-delay: 0.4s; }
        .glass-card:nth-child(4) { animation-delay: 0.6s; }

        h2 {
            font-size: 1.4em;
            font-weight: 500;
            margin-top: 0;
            margin-bottom: 20px;
            color: #e2e8f0;
            display: flex;
            align-items: center;
        }

        p {
            color: #cbd5e1;
            font-size: 1.05em;
        }

        /* 5. 优雅的标签设计 */
        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .skill-tag {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 0.9em;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .skill-tag:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.05);
        }

        /* 6. 链接与视频适配 */
        a {
            color: #38bdf8;
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        a:hover {
            opacity: 0.7;
        }

        video {
            width: 100%;
            border-radius: 12px;
            margin-top: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            background: #000; /* 视频加载前显示纯黑 */
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>[你的名字]</h1>
            <div class="subtitle">CREATIVE DEVELOPER / VISUAL THINKER</div>
        </header>

        <div class="glass-card">
            <h2>关于我</h2>
            <p>探索代码与设计的边界。我致力于用最简约的方式解决复杂的问题，构建干净、直观且充满细节的数字体验。</p>
        </div>

        <div class="glass-card">
            <h2>作品 Demo</h2>
            <p>最近的一个视觉交互尝试：</p>
            <video controls>
                <source src="demo.mp4" type="video/mp4">
            </video>
        </div>

        <div class="glass-card">
            <h2>技能栈</h2>
            <div class="skills">
                <span class="skill-tag">Design System</span>
                <span class="skill-tag">HTML / CSS</span>
                <span class="skill-tag">JavaScript</span>
                <span class="skill-tag">Python</span>
            </div>
        </div>

        <div class="glass-card">
            <h2>取得联系</h2>
            <p>Email: <a href="mailto:your.email@example.com">your.email@example.com</a></p>
            <p>GitHub: <a href="https://github.com/你的用户名">@你的用户名</a></p>
        </div>
    </div>
</body>
</html>
