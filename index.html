<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的星空主页 - 历程与厚涂版</title>
    <style>
        /* 1. 梵高油画调色盘 & 基础设定 */
        :root {
            --vg-canvas: #050d1a;       /* 极暗的画布底色 */
            --vg-cypress: #020611;      /* 柏树的极夜黑绿 */
            --vg-ultramarine: #183b75;  /* 群青底色 */
            --vg-cyan: #5588b5;         /* 星云的亮青色 */
            --vg-yellow: #f0d060;       /* 镉黄（星月） */
            --vg-glow: #e09f3e;         /* 橙黄色的光晕 */
            --text-main: #f0f4f8;
            --text-muted: #a0aec0;
        }

        body {
            margin: 0;
            font-family: "Noto Serif SC", "Songti SC", serif;
            color: var(--text-main);
            background-color: var(--vg-canvas);
            min-height: 100vh;
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* 2. 极致还原的油画笔触背景 */
        .painted-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            /* 应用非对称扭曲滤镜，拉出细长的笔触 */
            filter: url(#authentic-brushstrokes);
            overflow: hidden;
            background: var(--vg-ultramarine);
        }

        /* 柏树轮廓（左下角的深色巨影） */
        .cypress-tree {
            position: absolute;
            bottom: -10%; left: -5%;
            width: 40vw; height: 80vh;
            background: var(--vg-cypress);
            border-radius: 50% 50% 0 0 / 80% 100% 0 0;
            box-shadow: 20px 0 50px rgba(0,0,0,0.8);
            transform-origin: bottom center;
            animation: treeSway 15s infinite alternate ease-in-out;
        }

        /* 星空主漩涡 */
        .main-swirl {
            position: absolute;
            top: 20%; left: 20%;
            width: 60vw; height: 30vw;
            background: radial-gradient(ellipse at center, var(--vg-cyan) 0%, transparent 70%);
            border-radius: 50%;
            transform: rotate(-20deg);
            animation: swirlPulse 12s infinite alternate ease-in-out;
        }

        /* 巨大的星月 */
        .crescent-moon {
            position: absolute;
            top: 10%; right: 10%;
            width: 15vw; height: 15vw;
            background: var(--vg-yellow);
            border-radius: 50%;
            box-shadow: 
                0 0 0 15px rgba(240, 208, 96, 0.4),
                0 0 0 35px rgba(224, 159, 62, 0.3),
                0 0 0 60px rgba(85, 136, 181, 0.2);
            animation: moonGlow 6s infinite alternate;
        }

        @keyframes treeSway {
            0% { transform: rotate(0deg) scaleY(1); }
            100% { transform: rotate(2deg) scaleY(1.05); }
        }
        @keyframes swirlPulse {
            0% { transform: rotate(-20deg) scale(0.9); opacity: 0.8; }
            100% { transform: rotate(-15deg) scale(1.1); opacity: 1; }
        }
        @keyframes moonGlow {
            0% { transform: scale(0.95); }
            100% { transform: scale(1.05); }
        }

        /* 画布噪点肌理 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.12;
            mix-blend-mode: overlay;
            pointer-events: none;
            z-index: 10;
        }

        /* 3. 容器与通用卡片排版 */
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 100px 20px;
            position: relative;
            z-index: 100;
        }

        header { margin-bottom: 70px; text-align: center; animation: fadeUp 1s ease-out; }
        h1 { font-size: 3.2em; letter-spacing: 5px; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .poetry-quote { font-size: 1.1em; color: var(--vg-yellow); letter-spacing: 2px; font-style: italic; }

        .glass-card {
            background: rgba(5, 13, 26, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(85, 136, 181, 0.2);
            border-top: 1px solid rgba(240, 208, 96, 0.3);
            border-radius: 4px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
            animation: fadeUp 1s ease-out backwards;
        }
        
        .glass-card:nth-child(2) { animation-delay: 0.2s; }
        .glass-card:nth-child(3) { animation-delay: 0.4s; }
        .glass-card:nth-child(4) { animation-delay: 0.6s; }

        h2 {
            font-size: 1.4em; color: var(--vg-yellow);
            margin-top: 0; margin-bottom: 25px;
            padding-bottom: 10px; border-bottom: 1px dashed rgba(240, 208, 96, 0.3);
        }

        p, ul, .timeline-content {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: #cbd5e1; font-size: 1.05em; font-weight: 300; line-height: 1.7;
        }

        /* 标签样式 */
        .tags-container { display: flex; flex-wrap: wrap; gap: 12px; }
        .tag {
            font-family: -apple-system, sans-serif;
            background: rgba(85, 136, 181, 0.15);
            border: 1px solid rgba(85, 136, 181, 0.5);
            color: #fff; padding: 6px 15px; border-radius: 2px;
            font-size: 0.85em; transition: all 0.3s ease;
        }
        .tag:hover { background: var(--vg-glow); border-color: var(--vg-yellow); color: #000; }

        a { color: var(--vg-yellow); text-decoration: none; border-bottom: 1px dotted var(--vg-yellow); transition: all 0.3s ease; }
        a:hover { color: #fff; border-bottom-color: #fff; }
